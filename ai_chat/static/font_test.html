<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字体测试</title>
    <style>
        @font-face {
            font-family: 'MLD8102';
            src: url('MLD8102.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        
        .font-test {
            font-family: 'MLD8102', sans-serif;
            font-size: 24px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>MLD8102 字体测试</h1>
    
    <div id="fontStatus" class="status">正在检测字体...</div>
    
    <div class="test-section">
        <h2>字体文件测试</h2>
        <p>字体文件路径: static/MLD8102.ttf</p>
        <button onclick="testFontFile()">测试字体文件</button>
        <div id="fileStatus" class="status" style="display:none;"></div>
    </div>
    
    <div class="test-section">
        <h2>字体显示测试</h2>
        <p>如果字体加载成功，下面的文字应该使用 MLD8102 字体显示：</p>
        <div class="font-test">
            这是测试文本 - Test Text
        </div>
    </div>
    
    <div class="test-section">
        <h2>蒙古文测试</h2>
        <div class="font-test" style="font-size: 32px;">
            ᠮᠣᠩᠭᠤᠯ ᠬᠡᠯᠡ
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkFont();
        });
        
        function checkFont() {
            const fontCheck = new FontFace('MLD8102', 'url(MLD8102.ttf)');
            const statusDiv = document.getElementById('fontStatus');
            
            fontCheck.load().then(function(face) {
                document.fonts.add(face);
                statusDiv.textContent = '✓ 字体加载成功！';
                statusDiv.className = 'status success';
            }).catch(function(error) {
                statusDiv.textContent = '✗ 字体加载失败: ' + error;
                statusDiv.className = 'status error';
            });
        }
        
        async function testFontFile() {
            const fileStatus = document.getElementById('fileStatus');
            fileStatus.style.display = 'block';
            fileStatus.className = 'status';
            fileStatus.textContent = '正在测试...';
            
            try {
                const response = await fetch('MLD8102.ttf');
                if (response.ok) {
                    const blob = await response.blob();
                    fileStatus.textContent = `✓ 字体文件可用，大小: ${(blob.size / 1024).toFixed(2)} KB, 类型: ${blob.type}`;
                    fileStatus.className = 'status success';
                } else {
                    fileStatus.textContent = '✗ 字体文件不可用 (HTTP ' + response.status + ')';
                    fileStatus.className = 'status error';
                }
            } catch (error) {
                fileStatus.textContent = '✗ 测试失败: ' + error;
                fileStatus.className = 'status error';
            }
        }
    </script>
</body>
</html>
